name: CI - Lint & Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Wait for MySQL to be ready
        run: sleep 20

      - name: Create test database
        run: |
          mysql -h 127.0.0.1 -u root -e "CREATE DATABASE IF NOT EXISTS expense_tracker_test;"

      - name: Install dependencies
        run: npm install

      - name: Create .env.test file from secret
        run: echo "${{ secrets.ENV_TEST }}" > .env.test

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest Unit Tests
        run: npm test
