jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: expense_tracker_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Wait for MySQL to be ready
        run: |
          sudo apt-get install -y mysql-client
          until mysqladmin ping -h 127.0.0.1 --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Create .env.test
        run: |
          echo "DB_HOST=127.0.0.1" >> .env.test
          echo "DB_USER=root" >> .env.test
          echo "DB_PASSWORD=root" >> .env.test
          echo "DB_NAME=expense_tracker_test" >> .env.test
          echo "PORT=3000" >> .env.test

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest Unit Tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js
